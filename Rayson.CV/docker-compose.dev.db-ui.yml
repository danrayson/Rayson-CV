# ===========================================
# Docker Compose - Development: Database + UI
# ===========================================
# Usage: docker compose -f docker-compose.dev.db-ui.yml up -d
# Purpose: Run PostgreSQL and UI in Docker, debug API locally
# API runs on host at http://localhost:13245
# ===========================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: raysoncv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: raysoncv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raysoncv"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ui:
    build:
      context: ./UI
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:13245/
    container_name: raysoncv-ui
    restart: unless-stopped
    environment:
      API_HEALTH_URL: http://host.docker.internal:13245/health
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Ollama (AI Chatbot)
  # ===========================================
  ollama:
    build:
      context: ./Api/Infrastructure/Ollama
      dockerfile: ollama.Dockerfile
    environment:
      - CUSTOM_MODELS=["llama3.2:latest","nomic-embed-text"]
    volumes:
      - ollama_data:/root/.ollama
    container_name: ollama
    healthcheck:
      test: ["CMD", "/ollama.healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 10s
    networks:
      - internal
    # NVIDIA GPU Support: Uncomment the following to enable NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  postgres-data:
  ollama_data:

networks:
  internal:
    driver: bridge
