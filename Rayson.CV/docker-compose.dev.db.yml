# ===========================================
# Docker Compose - Development: Database Only
# ===========================================
# Usage: docker compose -f docker-compose.dev.db.yml up -d
# Purpose: Run only PostgreSQL for local debugging of API and UI
# ===========================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: raysoncv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: raysoncv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raysoncv"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================
  # Ollama (AI Chatbot)
  # ===========================================
  ollama:
    build:
      context: ./Api/Infrastructure/Ollama
      dockerfile: ollama.Dockerfile
    environment:
      - CUSTOM_MODELS=["llama3.2:latest","nomic-embed-text"]
    volumes:
      - ollama_data:/root/.ollama
    container_name: ollama
    healthcheck:
      test: ["CMD", "/ollama.healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 10s
    networks:
      - internal
    # NVIDIA GPU Support: Uncomment the following to enable NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  postgres-data:
  ollama_data:

networks:
  internal:
    driver: bridge
