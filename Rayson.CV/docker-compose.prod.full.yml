# ===========================================
# Docker Compose - Production: Full Stack
# ===========================================
# Usage: docker compose -f docker-compose.prod.full.yml --env-file .env.production up -d
# Purpose: Run all services (API, UI, Ollama) in Docker for production
# ===========================================

services:
  # ===========================================
  # API (.NET 8.0)
  # ===========================================
  api:
    build:
      context: ./Api
      dockerfile: prod.Dockerfile
    container_name: raysoncv-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Cors__AllowedOrigins: https://www.rayson.dev,https://rayson.dev
      Ollama__Url: http://ollama:11434
      Graph__ClientSecret: ${GRAPH_CLIENT_SECRET}
    ports:
      - "13245:8080"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================
  # UI (React/Vite)
  # ===========================================
  ui:
    build:
      context: ./UI
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://api.rayson.dev/
    container_name: raysoncv-ui
    restart: unless-stopped
    environment:
      API_HEALTH_URL: http://api:8080/health
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # Ollama (AI Chatbot)
  # ===========================================
  ollama:
    build:
      context: ./Api/Infrastructure/Ollama
      dockerfile: ollama.Dockerfile
    environment:
      - CUSTOM_MODELS=["llama3.2:latest"]
    volumes:
      - ollama_data:/root/.ollama
    container_name: raysoncv-ollama
    healthcheck:
      test: ["CMD", "/ollama.healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 100
      start_period: 120s
    networks:
      - internal
    # NVIDIA GPU Support: Uncomment the following to enable NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# ===========================================
# Networks
# ===========================================
networks:
  internal:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  ollama_data:
