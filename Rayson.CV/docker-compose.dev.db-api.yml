# ===========================================
# Docker Compose - Development: Database + API
# ===========================================
# Usage: docker compose -f docker-compose.dev.db-api.yml up -d
# Purpose: Run PostgreSQL and API in Docker, debug UI locally
# UI connects to API at http://localhost:13245
# ===========================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: raysoncv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: raysoncv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raysoncv"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./Api
      dockerfile: Dockerfile
    container_name: raysoncv-api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: raysoncv
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      ASPNETCORE_ENVIRONMENT: Development
      Graph__ClientSecret: notachancebuddy
      Cors__AllowedOrigins: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: Debug
      Ollama__Url: http://ollama:11434
    ports:
      - "13245:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================
  # Ollama (AI Chatbot)
  # ===========================================
  ollama:
    build:
      context: ./Api/Infrastructure/Ollama
      dockerfile: ollama.Dockerfile
    environment:
      - CUSTOM_MODELS=["llama3.2:latest","nomic-embed-text"]
    volumes:
      - ollama_data:/root/.ollama
    container_name: raysoncv-ollama
    healthcheck:
      test: ["CMD", "/ollama.healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 10s
    networks:
      - internal
    # NVIDIA GPU Support: Uncomment the following to enable NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  internal:
    driver: bridge

volumes:
  postgres-data:
  ollama_data:
