name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API base URL for Electron apps'
        required: false
        default: 'https://api.rayson.dev/'

jobs:
  build-electron-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Rayson.CV/UI/package-lock.json

      - name: Install dependencies
        run: cd Rayson.CV/UI && npm ci

      - name: Build Electron app
        run: |
          API_URL="${{ github.event.inputs.api_base_url || 'https://api.rayson.dev/' }}"
          cd Rayson.CV/UI && VITE_API_BASE_URL=$API_URL npm run electron:build -- --linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: Rayson.CV/UI/build/*.AppImage

  build-electron-mac:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Rayson.CV/UI/package-lock.json

      - name: Install dependencies
        run: cd Rayson.CV/UI && npm ci

      - name: Build Electron app
        run: |
          API_URL="${{ github.event.inputs.api_base_url || 'https://api.rayson.dev/' }}"
          cd Rayson.CV/UI && VITE_API_BASE_URL=$API_URL npm run electron:build -- --mac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: Rayson.CV/UI/build/*.dmg

  build-electron-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Rayson.CV/UI/package-lock.json

      - name: Install dependencies
        run: cd Rayson.CV/UI && npm ci

      - name: Build Electron app
        run: |
          $apiUrl = "${{ github.event.inputs.api_base_url || 'https://api.rayson.dev/' }}"
          cd Rayson.CV/UI
          $env:VITE_API_BASE_URL=$apiUrl
          npm run electron:build -- --win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: Rayson.CV/UI/build/*.exe
